<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venn Diagram Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        /* ป้องกันการคลุมดำและไฮไลท์ข้อความเวลาลาก */
        #venn-svg {
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8 flex justify-center items-center">

    <div class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-blue-600 p-4 sm:p-5 text-white">
            <h1 class="text-xl md:text-2xl font-bold">เครื่องมือวาดแผนภาพเวนน์แบบอิสระ (Venn Diagram Builder)</h1>
            <p class="text-blue-100 mt-1 text-sm">ลากวาง ปรับขนาด ระบายสี และพิมพ์ข้อความได้ตามใจชอบ</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-0 lg:gap-8 p-6">
            <!-- Left: Canvas Area -->
            <div class="lg:col-span-7 flex flex-col items-center border-b lg:border-b-0 lg:border-r border-slate-200 pb-8 lg:pb-0 lg:pr-8">
                
                <!-- Toolbar -->
                <div class="flex w-full mb-4 bg-slate-100 p-1 rounded-xl shadow-inner">
                    <button onclick="setTool('MOVE')" id="btn-tool-move" class="tool-btn flex-1 flex items-center justify-center gap-2 py-2 rounded-lg font-bold text-sm transition-all bg-white shadow-sm text-blue-600 border border-slate-200">
                        <span class="text-lg">✋</span> จัดตำแหน่ง
                    </button>
                    <button onclick="setTool('PAINT')" id="btn-tool-paint" class="tool-btn flex-1 flex items-center justify-center gap-2 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 hover:bg-slate-200">
                        <span class="text-lg">🖌️</span> ระบายสี
                    </button>
                    <button onclick="setTool('TEXT')" id="btn-tool-text" class="tool-btn flex-1 flex items-center justify-center gap-2 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 hover:bg-slate-200">
                        <span class="text-lg">🔤</span> ใส่ข้อความ
                    </button>
                </div>

                <!-- SVG Canvas -->
                <svg id="venn-svg" viewBox="0 -30 650 600" class="w-full max-w-[600px] border border-slate-100 bg-white rounded-xl shadow-sm transition-all cursor-grab">
                    <defs>
                        <!-- Dynamic Circles for Masks -->
                        <circle id="cA" cx="300" cy="250" r="120" />
                        <circle id="cB" cx="400" cy="250" r="0" />
                        <circle id="cC" cx="350" cy="360" r="0" />
                        <clipPath id="clipC"><use href="#cC"/></clipPath>

                        <!-- Region Masks -->
                        <mask id="m0"><rect width="100%" height="100%" fill="white" /><use href="#cA" fill="black" /><use href="#cB" fill="black" /><use href="#cC" fill="black" /></mask>
                        <mask id="m1"><rect width="100%" height="100%" fill="white" /><use href="#cA" fill="black" /><use href="#cB" fill="black" /></mask>
                        <mask id="m2"><rect width="100%" height="100%" fill="white" /><use href="#cA" fill="black" /><use href="#cC" fill="black" /></mask>
                        <mask id="m3"><use href="#cC" fill="white" /><use href="#cA" fill="black" /></mask>
                        <mask id="m4"><rect width="100%" height="100%" fill="white" /><use href="#cB" fill="black" /><use href="#cC" fill="black" /></mask>
                        <mask id="m5"><use href="#cC" fill="white" /><use href="#cB" fill="black" /></mask>
                        <mask id="m6"><use href="#cB" fill="white" /><use href="#cC" fill="black" /></mask>
                        <mask id="m7"><use href="#cB" fill="white" clipPath="url(#clipC)" /></mask>
                    </defs>

                    <!-- Painted Regions -->
                    <rect id="reg-0" x="0" y="0" width="650" height="570" fill="#FFFFFF" mask="url(#m0)" />
                    <use id="reg-1" href="#cC" fill="#FFFFFF" mask="url(#m1)" />
                    <use id="reg-2" href="#cB" fill="#FFFFFF" mask="url(#m2)" />
                    <use id="reg-3" href="#cB" fill="#FFFFFF" mask="url(#m3)" />
                    <use id="reg-4" href="#cA" fill="#FFFFFF" mask="url(#m4)" />
                    <use id="reg-5" href="#cA" fill="#FFFFFF" mask="url(#m5)" />
                    <use id="reg-6" href="#cA" fill="#FFFFFF" mask="url(#m6)" />
                    <use id="reg-7" href="#cA" fill="#FFFFFF" mask="url(#m7)" />

                    <!-- Borders -->
                    <use id="border-A" href="#cA" fill="none" stroke="#1E293B" stroke-width="2.5" />
                    <use id="border-B" href="#cB" fill="none" stroke="#1E293B" stroke-width="2.5" />
                    <use id="border-C" href="#cC" fill="none" stroke="#1E293B" stroke-width="2.5" />
                    <rect x="0" y="0" width="650" height="570" fill="none" stroke="#1E293B" stroke-width="4" />

                    <!-- Set Labels -->
                    <text id="label-A-display" text-anchor="middle" font-size="26" font-weight="bold" fill="#1E293B" class="pointer-events-none">A</text>
                    <text id="label-B-display" text-anchor="middle" font-size="26" font-weight="bold" fill="#1E293B" class="pointer-events-none" style="display:none;">B</text>
                    <text id="label-C-display" text-anchor="middle" font-size="26" font-weight="bold" fill="#1E293B" class="pointer-events-none" style="display:none;">C</text>
                    <text id="label-U-display" x="635" y="30" text-anchor="end" font-size="26" font-weight="bold" fill="#1E293B" class="pointer-events-none">U</text>

                    <!-- Freehand Texts Container -->
                    <g id="texts-container"></g>
                </svg>

                <p id="helper-text" class="text-slate-500 text-sm mt-4 text-center">💡 ลากที่วงกลมเพื่อย้ายตำแหน่งอิสระ</p>
            </div>

            <!-- Right: Control Panel -->
            <div class="lg:col-span-5 flex flex-col pt-6 lg:pt-0">
                
                <!-- Panel: MOVE -->
                <div id="panel-move" class="mb-6 bg-indigo-50 p-5 rounded-2xl border-2 border-indigo-200 block">
                    <h2 class="text-lg font-bold text-indigo-900 mb-4">⚙️ จัดการวงกลม</h2>
                    
                    <div class="space-y-4">
                        <!-- Set A -->
                        <div class="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                            <div class="font-bold text-slate-700 mb-2">วงกลม A (เปิดใช้งานเสมอ)</div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs text-slate-500">รัศมี:</span>
                                <input type="range" id="radius-A" min="40" max="250" value="120" class="flex-1" oninput="updateCircleProps('A', this.value)">
                            </div>
                        </div>

                        <!-- Set B -->
                        <div class="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-slate-700">วงกลม B</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="toggle-B" class="sr-only peer" onchange="toggleSet('B', this.checked)">
                                    <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                                </label>
                            </div>
                            <div id="controls-B" class="opacity-50 pointer-events-none flex items-center gap-3 transition-opacity">
                                <span class="text-xs text-slate-500">รัศมี:</span>
                                <input type="range" id="radius-B" min="40" max="250" value="120" class="flex-1" oninput="updateCircleProps('B', this.value)">
                            </div>
                        </div>

                        <!-- Set C -->
                        <div class="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-slate-700">วงกลม C</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="toggle-C" class="sr-only peer" onchange="toggleSet('C', this.checked)">
                                    <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                                </label>
                            </div>
                            <div id="controls-C" class="opacity-50 pointer-events-none flex items-center gap-3 transition-opacity">
                                <span class="text-xs text-slate-500">รัศมี:</span>
                                <input type="range" id="radius-C" min="40" max="250" value="120" class="flex-1" oninput="updateCircleProps('C', this.value)">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Panel: PAINT -->
                <div id="panel-paint" class="mb-6 hidden">
                    <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-sm font-semibold text-slate-700">จานสี (เลือกทีละสี)</label>
                            <div class="flex items-center gap-2">
                                <span id="brush-label" class="text-xs text-slate-500 font-medium">สีพู่กัน:</span>
                                <div id="brush-preview" class="w-8 h-8 rounded-full border-2 border-slate-300 shadow-inner flex items-center justify-center text-sm" style="background-color: #3B82F6;"></div>
                            </div>
                        </div>
                        <div class="flex gap-2 flex-wrap items-center" id="color-palette"></div>
                    </div>
                    <button onclick="clearColors()" class="mt-4 w-full bg-red-50 border border-red-200 hover:bg-red-100 text-red-700 font-bold py-2.5 rounded-lg shadow-sm active:scale-95 transition-transform">
                        ล้างสีทั้งหมด
                    </button>
                </div>

                <!-- Panel: TEXT -->
                <div id="panel-text" class="mb-6 bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 hidden">
                    <h2 class="text-lg font-bold text-blue-900 mb-1">✏️ พิมพ์ข้อความอิสระ</h2>
                    <p class="text-sm text-blue-700 mb-4">คลิกจุดใดก็ได้บนภาพเพื่อเริ่มพิมพ์</p>
                    
                    <div class="bg-white p-3 rounded-xl border border-blue-100 shadow-sm">
                        <input type="text" id="text-input" disabled placeholder="คลิกบนภาพก่อน..." class="w-full px-4 py-3 text-lg font-mono border-2 border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-400" oninput="handleTextChange(this.value)">
                        
                        <button id="btn-delete-text" onclick="deleteSelectedText()" class="mt-2 text-xs text-red-500 font-bold hover:underline hidden">
                            ลบข้อความที่เลือก
                        </button>
                    </div>

                    <button onclick="clearAllTexts()" class="mt-4 w-full py-2 bg-white border border-red-200 text-red-600 font-bold rounded-lg hover:bg-red-50 transition-colors">
                        ลบข้อความทั้งหมดในภาพ
                    </button>
                </div>

                <!-- Label Settings -->
                <div class="mt-auto pt-6 w-full bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">ตั้งชื่อป้ายกำกับ (Labels)</label>
                    <div class="flex gap-2">
                        <div class="flex-1"><input type="text" id="label-A" value="A" oninput="updateLabel('A', this.value)" class="w-full px-2 py-1 text-sm font-medium border rounded text-center focus:outline-none focus:border-blue-500"></div>
                        <div class="flex-1"><input type="text" id="label-B" value="B" disabled oninput="updateLabel('B', this.value)" class="w-full px-2 py-1 text-sm font-medium border rounded text-center disabled:bg-slate-200 focus:outline-none focus:border-blue-500"></div>
                        <div class="flex-1"><input type="text" id="label-C" value="C" disabled oninput="updateLabel('C', this.value)" class="w-full px-2 py-1 text-sm font-medium border rounded text-center disabled:bg-slate-200 focus:outline-none focus:border-blue-500"></div>
                        <div class="flex-1"><input type="text" id="label-U" value="U" oninput="updateLabel('U', this.value)" class="w-full px-2 py-1 text-sm font-medium border rounded text-center focus:outline-none focus:border-blue-500"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let activeTool = 'MOVE';
        const circles = {
            A: { active: true, cx: 300, cy: 250, r: 120, label: 'A' },
            B: { active: false, cx: 400, cy: 250, r: 120, label: 'B' },
            C: { active: false, cx: 350, cy: 360, r: 120, label: 'C' }
        };
        let labelU = 'U';

        const regionColors = Array(8).fill('#FFFFFF');
        let selectedBrushColor = '#3B82F6';
        let isEraser = false;
        const AVAILABLE_COLORS = [
            { hex: '#EF4444', name: 'แดง' }, { hex: '#3B82F6', name: 'น้ำเงิน' },
            { hex: '#FACC15', name: 'เหลือง' }, { hex: '#22C55E', name: 'เขียว' },
            { hex: '#A855F7', name: 'ม่วง' }
        ];

        let dragInfo = null;
        let canvasTexts = [];
        let selectedTextId = null;

        // --- DOM Elements ---
        const svg = document.getElementById('venn-svg');
        const textInput = document.getElementById('text-input');
        const btnDeleteText = document.getElementById('btn-delete-text');
        const textsContainer = document.getElementById('texts-container');
        const brushPreview = document.getElementById('brush-preview');
        const brushLabel = document.getElementById('brush-label');

        // --- Init ---
        function init() {
            renderPalette();
            updateDOM();
        }

        // --- Tool Management ---
        function setTool(tool) {
            activeTool = tool;
            
            ['MOVE', 'PAINT', 'TEXT'].forEach(t => {
                const btn = document.getElementById(`btn-tool-${t.toLowerCase()}`);
                if (t === tool) {
                    btn.className = "tool-btn flex-1 flex items-center justify-center gap-2 py-2 rounded-lg font-bold text-sm transition-all bg-white shadow-sm text-blue-600 border border-slate-200";
                } else {
                    btn.className = "tool-btn flex-1 flex items-center justify-center gap-2 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 hover:bg-slate-200";
                }
            });

            document.getElementById('panel-move').style.display = tool === 'MOVE' ? 'block' : 'none';
            document.getElementById('panel-paint').style.display = tool === 'PAINT' ? 'block' : 'none';
            document.getElementById('panel-text').style.display = tool === 'TEXT' ? 'block' : 'none';

            const helper = document.getElementById('helper-text');
            if(tool === 'MOVE') {
                svg.className = "w-full max-w-[600px] border border-slate-100 bg-white rounded-xl shadow-sm transition-all cursor-grab";
                helper.innerText = "💡 ลากที่วงกลมเพื่อย้ายตำแหน่งอิสระ";
            } else if(tool === 'PAINT') {
                svg.className = "w-full max-w-[600px] border border-slate-100 bg-white rounded-xl shadow-sm transition-all cursor-crosshair";
                helper.innerText = "💡 เลือกสีขวามือ และคลิกเทสีลงในช่อง (ทาสีทับเพื่อผสมสี)";
            } else {
                svg.className = "w-full max-w-[600px] border border-slate-100 bg-white rounded-xl shadow-sm transition-all cursor-text";
                helper.innerText = "💡 คลิกบนพื้นที่ว่างเพื่อเพิ่มข้อความใหม่ หรือคลิกข้อความเดิมเพื่อแก้ไข";
                selectedTextId = null;
                updateTextUI();
                renderTexts();
            }
        }

        function toggleSet(setId, isActive) {
            circles[setId].active = isActive;
            const controls = document.getElementById(`controls-${setId}`);
            const labelInput = document.getElementById(`label-${setId}`);
            
            if (isActive) {
                controls.classList.remove('opacity-50', 'pointer-events-none');
                labelInput.disabled = false;
                if(setId === 'B') { circles.B.cx = 400; circles.B.cy = 250; circles.B.r = parseInt(document.getElementById('radius-B').value); }
                if(setId === 'C') { circles.C.cx = 350; circles.C.cy = 360; circles.C.r = parseInt(document.getElementById('radius-C').value); }
            } else {
                controls.classList.add('opacity-50', 'pointer-events-none');
                labelInput.disabled = true;
                circles[setId].r = 0; 
                
                if (setId === 'B') [2, 3, 6, 7].forEach(i => regionColors[i] = '#FFFFFF');
                else if (setId === 'C') [1, 3, 5, 7].forEach(i => regionColors[i] = '#FFFFFF');
            }
            updateDOM();
        }

        function updateCircleProps(setId, radius) {
            circles[setId].r = parseInt(radius);
            updateDOM();
        }

        function updateLabel(id, val) {
            if (id === 'U') {
                labelU = val;
                document.getElementById('label-U-display').textContent = val;
            } else {
                circles[id].label = val;
                updateDOM();
            }
        }

        function hex2rgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }
        function rgb2hex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }
        function mixColors(bgHex, brushHex) {
            if (bgHex.toUpperCase() === '#FFFFFF') return brushHex.toUpperCase();
            if (brushHex.toUpperCase() === '#FFFFFF') return '#FFFFFF';
            let c1 = hex2rgb(bgHex), c2 = hex2rgb(brushHex);
            return rgb2hex(Math.round((c1.r + c2.r) / 2), Math.round((c1.g + c2.g) / 2), Math.round((c1.b + c2.b) / 2));
        }

        function renderPalette() {
            const container = document.getElementById('color-palette');
            container.innerHTML = '';
            
            AVAILABLE_COLORS.forEach(c => {
                const isSelected = !isEraser && selectedBrushColor === c.hex;
                const btn = document.createElement('button');
                btn.className = `relative w-10 h-10 rounded-full border-2 transition-transform hover:scale-110 active:scale-95 ${isSelected ? 'border-slate-800 scale-110 shadow-md' : 'border-slate-300'}`;
                btn.style.backgroundColor = c.hex;
                btn.title = c.name;
                btn.onclick = () => { isEraser = false; selectedBrushColor = c.hex; updateBrushPreview(); renderPalette(); };
                
                if(isSelected) {
                    btn.innerHTML = `<span class="absolute inset-0 flex items-center justify-center text-white drop-shadow-md font-bold text-sm mix-blend-difference">✓</span>`;
                }
                container.appendChild(btn);
            });

            const div = document.createElement('div');
            div.className = "w-px h-8 bg-slate-300 mx-1";
            container.appendChild(div);

            const eraserBtn = document.createElement('button');
            eraserBtn.className = `relative flex items-center gap-1 px-3 h-10 rounded-full border-2 transition-transform hover:scale-105 active:scale-95 ${isEraser ? 'border-slate-800 bg-slate-200 shadow-md scale-105' : 'border-slate-300 bg-white'}`;
            eraserBtn.onclick = () => { isEraser = true; updateBrushPreview(); renderPalette(); };
            eraserBtn.innerHTML = `<span class="text-lg">🧽</span><span class="text-sm font-bold ${isEraser ? 'text-slate-800' : 'text-slate-500'}">ยางลบ</span>`;
            container.appendChild(eraserBtn);
        }

        function updateBrushPreview() {
            brushLabel.innerText = isEraser ? 'โหมดยางลบ:' : 'สีพู่กัน:';
            brushPreview.style.backgroundColor = isEraser ? '#FFFFFF' : selectedBrushColor;
            brushPreview.innerHTML = isEraser ? '🧽' : '';
        }

        function clearColors() {
            regionColors.fill('#FFFFFF');
            updateDOM();
        }

        // --- Text Logic ---
        function handleTextChange(val) {
            if (selectedTextId !== null) {
                if (/^[a-zA-Z\u0E00-\u0E7F0-9\+\-\*\/\=\(\)\s]*$/.test(val)) {
                    const txtObj = canvasTexts.find(t => t.id === selectedTextId);
                    if(txtObj) txtObj.text = val;
                    renderTexts();
                } else {
                    textInput.value = canvasTexts.find(t => t.id === selectedTextId)?.text || '';
                }
            }
        }

        function deleteSelectedText() {
            if (selectedTextId !== null) {
                canvasTexts = canvasTexts.filter(t => t.id !== selectedTextId);
                selectedTextId = null;
                updateTextUI();
                renderTexts();
            }
        }

        function clearAllTexts() {
            canvasTexts = [];
            selectedTextId = null;
            updateTextUI();
            renderTexts();
        }

        function updateTextUI() {
            if (selectedTextId === null) {
                textInput.value = '';
                textInput.disabled = true;
                textInput.placeholder = "คลิกบนภาพก่อน...";
                btnDeleteText.classList.add('hidden');
            } else {
                const txt = canvasTexts.find(t => t.id === selectedTextId);
                textInput.value = txt ? txt.text : '';
                textInput.disabled = false;
                textInput.placeholder = "พิมพ์ข้อความ (เช่น 2x+1)";
                btnDeleteText.classList.remove('hidden');
                setTimeout(() => textInput.focus(), 50);
            }
        }

        function renderTexts() {
            textsContainer.innerHTML = '';
            canvasTexts.forEach(txt => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                if (activeTool === 'TEXT' && selectedTextId === txt.id) {
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", txt.x - 40);
                    rect.setAttribute("y", txt.y - 20);
                    rect.setAttribute("width", 80);
                    rect.setAttribute("height", 40);
                    rect.setAttribute("fill", "none");
                    rect.setAttribute("stroke", "#3B82F6");
                    rect.setAttribute("stroke-width", "2");
                    rect.setAttribute("stroke-dasharray", "4");
                    rect.setAttribute("rx", "4");
                    g.appendChild(rect);
                }

                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textNode.setAttribute("x", txt.x);
                textNode.setAttribute("y", txt.y);
                textNode.setAttribute("text-anchor", "middle");
                textNode.setAttribute("dominant-baseline", "middle");
                textNode.setAttribute("font-size", "22");
                textNode.setAttribute("font-weight", "bold");
                textNode.setAttribute("fill", "#0F172A");
                textNode.setAttribute("class", "pointer-events-none");
                textNode.textContent = txt.text;

                g.appendChild(textNode);
                textsContainer.appendChild(g);
            });
        }

        // --- เมาส์และการลากที่ถูกปรับปรุงให้สมบูรณ์ (Bullet-proof Drag Events) ---
        function getMousePos(e) {
            const pt = svg.createSVGPoint();
            // รองรับทั้ง MouseEvent และ PointerEvent
            pt.x = e.clientX;
            pt.y = e.clientY;
            const ctm = svg.getScreenCTM();
            if (!ctm) return null;
            return pt.matrixTransform(ctm.inverse());
        }

        svg.addEventListener('pointerdown', (e) => {
            // เช็คว่าเป็นเมาส์คลิกซ้ายหรือทัชสกรีนเท่านั้น
            if (e.pointerType === 'mouse' && e.button !== 0) return; 

            // **สำคัญมาก!** ป้องกันบราวเซอร์เข้าใจผิดว่าผู้ใช้พยายามจะคลุมดำหรือลากรูปภาพปกติ
            e.preventDefault(); 
            
            const pt = getMousePos(e);
            if (!pt) return;
            const { x, y } = pt;

            if (activeTool === 'MOVE') {
                const hitC = circles.C.active && Math.hypot(x - circles.C.cx, y - circles.C.cy) <= circles.C.r;
                const hitB = circles.B.active && Math.hypot(x - circles.B.cx, y - circles.B.cy) <= circles.B.r;
                const hitA = circles.A.active && Math.hypot(x - circles.A.cx, y - circles.A.cy) <= circles.A.r;

                let targetId = null;
                // ลำดับการกด (C ทับ B ทับ A)
                if (hitC) targetId = 'C';
                else if (hitB) targetId = 'B';
                else if (hitA) targetId = 'A';

                if (targetId) {
                    // **สำคัญมาก!** ล็อกพอยน์เตอร์ให้อยู่กับ SVG ไม่ว่านิ้วจะหลุดกรอบไปไหน
                    svg.setPointerCapture(e.pointerId);
                    svg.classList.add('cursor-grabbing');
                    svg.classList.remove('cursor-grab');
                    
                    dragInfo = { 
                        id: targetId, 
                        offsetX: x - circles[targetId].cx, 
                        offsetY: y - circles[targetId].cy,
                        pointerId: e.pointerId 
                    };
                }
            } 
            else if (activeTool === 'TEXT') {
                const clickedIdx = canvasTexts.findIndex(t => Math.abs(t.x - x) < 30 && Math.abs(t.y - y) < 20);
                if (clickedIdx >= 0) {
                    selectedTextId = canvasTexts[clickedIdx].id;
                } else {
                    const newId = Date.now();
                    canvasTexts.push({ id: newId, x, y, text: '' });
                    selectedTextId = newId;
                }
                updateTextUI();
                renderTexts();
            }
            else if (activeTool === 'PAINT') {
                const inA = circles.A.active && Math.hypot(x - circles.A.cx, y - circles.A.cy) <= circles.A.r;
                const inB = circles.B.active && Math.hypot(x - circles.B.cx, y - circles.B.cy) <= circles.B.r;
                const inC = circles.C.active && Math.hypot(x - circles.C.cx, y - circles.C.cy) <= circles.C.r;

                let bit = 0;
                if (inC) bit |= 1;
                if (inB) bit |= 2;
                if (inA) bit |= 4;

                const brush = isEraser ? '#FFFFFF' : selectedBrushColor;
                regionColors[bit] = mixColors(regionColors[bit], brush);
                updateDOM();
            }
        });

        svg.addEventListener('pointermove', (e) => {
            if (activeTool === 'MOVE' && dragInfo && dragInfo.pointerId === e.pointerId) {
                // ป้องกันการ Scroll บนมือถือระหว่างลากวงกลม
                e.preventDefault(); 
                
                const pt = getMousePos(e);
                if (!pt) return;
                
                circles[dragInfo.id].cx = pt.x - dragInfo.offsetX;
                circles[dragInfo.id].cy = pt.y - dragInfo.offsetY;
                updateDOM();
            }
        });

        // จบการทำงานลากเมื่อปล่อยเมาส์/นิ้ว
        const stopDrag = (e) => {
            if (dragInfo && dragInfo.pointerId === e.pointerId) {
                try { svg.releasePointerCapture(e.pointerId); } catch(err) {}
                svg.classList.remove('cursor-grabbing');
                svg.classList.add('cursor-grab');
                dragInfo = null;
            }
        };

        svg.addEventListener('pointerup', stopDrag);
        svg.addEventListener('pointercancel', stopDrag);


        // --- Core DOM Update ---
        function updateDOM() {
            ['A', 'B', 'C'].forEach(id => {
                const c = circles[id];
                const circleEl = document.getElementById(`c${id}`);
                const borderEl = document.getElementById(`border-${id}`);
                const labelDisplay = document.getElementById(`label-${id}-display`);

                circleEl.setAttribute('cx', c.cx);
                circleEl.setAttribute('cy', c.cy);
                circleEl.setAttribute('r', c.active ? c.r : 0); 

                borderEl.style.display = c.active ? 'block' : 'none';

                if(c.active) {
                    labelDisplay.style.display = 'block';
                    labelDisplay.textContent = c.label;
                    labelDisplay.setAttribute('x', c.cx);
                    labelDisplay.setAttribute('y', id === 'C' ? c.cy + c.r + 30 : c.cy - c.r - 15); 
                } else {
                    labelDisplay.style.display = 'none';
                }
            });

            for (let i = 0; i < 8; i++) {
                document.getElementById(`reg-${i}`).setAttribute('fill', regionColors[i]);
                
                if ((i & 1) && !circles.C.active) document.getElementById(`reg-${i}`).style.display = 'none';
                else if ((i & 2) && !circles.B.active) document.getElementById(`reg-${i}`).style.display = 'none';
                else document.getElementById(`reg-${i}`).style.display = 'block';
            }

            renderTexts();
        }

        init();
    </script>
</body>
</html>
